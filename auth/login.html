<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                <a href="../index.html"> <span class="brand-name">User<span>Management</span></span></a>
            </div>

            <div class="nav-right">
                <a href="#" class="nav-link disabled">Support</a>
                <a href="./signup.html" class="btn-outline">Signup</a>
            </div>
        </div>
    </nav>
    <div class="signup-container">
        <div class="side-img"></div>

        <div class="form-section">
            <div class="form-header">
                <h3>Welcome Back</h3>
                <p>Please login to manage your users.</p>
            </div>

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                        <button type="button" id="togglePassword" class="eye-btn">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <a href="#" class="forgot-pass disabled">Forgot Password?</a>
                </div>
                <p id="errorText"></p>
                <button type="submit" class="submit-btn" id="form-submit">Login</button>
            </form>

            <p class="login-link">New here? <a href="./signup.html">Create Account</a></p>
        </div>
    </div>
    <div class=" otp-section">
<div class="form-header">
    <h3>Verify Your Email</h3>
    <p>We've sent a 6-digit code to your email. Please enter it below.</p>
</div>

<form id="otpForm">
    <div class="otp-input-wrapper">
        <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
        <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
        <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
        <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
        <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
        <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
    </div>

    <button type="submit" class="submit-btn" id="otp-submit">Verify Account</button>
</form>

<div class="login-link">
    Didn't receive the code? <a href="#" id="resendCode">Resend OTP</a>
    <div id="otpCountdown" style="margin-top: 10px; font-size: 0.9rem; color: #4361ee; display: none;">
        Resend available in <span id="timer">05:00</span>
    </div>
</div>
</div>
    <script src="auth.js" type="module"></script>
</body>

</html>

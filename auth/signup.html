<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

</head>

<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
               <a href="../index.html"> <span class="brand-name">User<span>Management</span></span></a>
            </div>

            <div class="nav-right">
                <a href="#" class="nav-link disabled">Support</a>
                <a href="./login.html" class="btn-outline">Login</a>
            </div>
        </div>
    </nav>
    <div class="signup-container">
        <div class="side-img"></div>

        <div class="form-section">
            <div class="form-header">
                <h3>Create Your Account</h3>
                <p>Please enter your details to get started.</p>
            </div>

            <form action="/signup" method="POST">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter Full Name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="name@example.com">
                </div>

                <div class="form-group" style="position: relative;">
                    <label for="DOB">Date of Birth</label>
                    <input type="text" id="dob" placeholder="Select Date of Birth">
                    <span class="icon">📅</span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                        <button type="button" id="togglePassword" class="eye-btn">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <p id="errorText"></p>
                <button type="submit" class="submit-btn">Signup</button>
            </form>

            <p class="login-link">Already have an account? <a href="./login.html">Login</a></p>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="auth.js"></script>
</body>

</html>
